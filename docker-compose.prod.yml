services:
  driver:
    image: ${IMAGE:-city-airport-taxis-driver:latest}
    pull_policy: ${PULL_POLICY:-missing}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_SOCKET_PATH: ${NEXT_PUBLIC_SOCKET_PATH:-/socket.io}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-3002}:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/auth/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
