name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/DEPLOY.md"

concurrency:
  group: deploy-driver-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/city-airport-taxis-driver
  DEFAULT_DEPLOY_PATH: /opt/city-airport-taxis-driver

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy files
        run: |
          test -f Dockerfile
          test -f docker-compose.prod.yml

      - name: Validate GitHub deploy configuration
        run: |
          missing=0
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "::error::Missing repository secret DEPLOY_HOST"
            missing=1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "::error::Missing repository secret DEPLOY_USER"
            missing=1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error::Missing repository secret DEPLOY_SSH_KEY"
            missing=1
          fi
          if [ -z "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "::warning::Missing repository secret GHCR_TOKEN — VPS image pull may fail for private packages"
          fi
          if [ -z "${{ vars.NEXT_PUBLIC_BACKEND_URL }}" ]; then
            echo "::warning::Missing repository variable NEXT_PUBLIC_BACKEND_URL — build may use an empty API URL"
          fi
          if [ -z "${{ vars.NEXT_PUBLIC_SITE_URL }}" ]; then
            echo "::warning::Missing repository variable NEXT_PUBLIC_SITE_URL — build may use an empty site URL"
          fi
          if [ "${{ vars.SSH_DEPLOY_ENABLED }}" = "false" ]; then
            echo "::error::SSH deploy is disabled via SSH_DEPLOY_ENABLED=false"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Configure the driver repo secrets/variables (Settings → Secrets and variables → Actions)."
            echo "See .github/DEPLOY.md for the full list."
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ vars.NEXT_PUBLIC_BACKEND_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SOCKET_PATH=${{ vars.NEXT_PUBLIC_SOCKET_PATH || '/socket.io' }}

      - name: Sync compose files on VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.prod.yml,deploy/docker-deploy.sh"
          target: ${{ secrets.DEPLOY_PATH || env.DEFAULT_DEPLOY_PATH }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE: ${{ env.IMAGE }}:${{ github.sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || env.DEFAULT_DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: GHCR_TOKEN,IMAGE,DEPLOY_PATH
          script: |
            set -euo pipefail
            APP_DIR="${DEPLOY_PATH:-/opt/city-airport-taxis-driver}"
            cd "${APP_DIR}"
            chmod +x deploy/docker-deploy.sh
            if [ ! -f .env.production ]; then
              echo "ERROR: Missing .env.production on VPS at ${APP_DIR}"
              echo "Copy your local .env.production to the server first (never commit it to git)."
              exit 1
            fi
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            fi
            export IMAGE="${IMAGE}"
            export PULL_POLICY=always
            ./deploy/docker-deploy.sh

      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            curl -fsS "http://127.0.0.1:${{ secrets.DEPLOY_PORT_APP || 3002 }}/auth/login"
