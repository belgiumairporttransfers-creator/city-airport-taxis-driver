name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

concurrency:
  group: deploy-driver-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/city-airport-taxis-driver

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy files
        run: |
          test -f Dockerfile
          test -f docker-compose.prod.yml

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ vars.NEXT_PUBLIC_BACKEND_URL || 'https://api.city-airport-taxis.be/api' }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://driver.city-airport-taxis.be' }}
            NEXT_PUBLIC_SOCKET_PATH=${{ vars.NEXT_PUBLIC_SOCKET_PATH || '/socket.io' }}

      - name: Sync compose files on VPS
        if: vars.SSH_DEPLOY_ENABLED == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.prod.yml,deploy/docker-deploy.sh"
          target: ${{ secrets.DEPLOY_PATH || '/opt/city-airport-taxis-driver' }}

      - name: Deploy to VPS via SSH
        if: vars.SSH_DEPLOY_ENABLED == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE: ${{ env.IMAGE }}:${{ github.sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: GHCR_TOKEN,IMAGE,DEPLOY_PATH
          script: |
            set -euo pipefail
            APP_DIR="${DEPLOY_PATH:-/opt/city-airport-taxis-driver}"
            cd "${APP_DIR}"
            chmod +x deploy/docker-deploy.sh
            if [ ! -f .env.production ]; then
              echo "ERROR: Missing .env.production on VPS at ${APP_DIR}"
              echo "Copy your local .env.production to the server first (never commit it to git)."
              exit 1
            fi
            LOGIN_TOKEN="${GHCR_TOKEN:-}"
            if [ -z "${LOGIN_TOKEN}" ]; then
              LOGIN_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            fi
            if [ -n "${LOGIN_TOKEN}" ]; then
              echo "${LOGIN_TOKEN}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            fi
            export IMAGE="${IMAGE}"
            export PULL_POLICY=always
            ./deploy/docker-deploy.sh

      - name: Post-deploy health check
        if: vars.SSH_DEPLOY_ENABLED == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            curl -fsS "http://127.0.0.1:${{ secrets.DEPLOY_PORT_APP || 3002 }}/auth/login"

      - name: Auto-deploy status
        if: always()
        run: |
          if [ "${{ vars.SSH_DEPLOY_ENABLED }}" = "true" ]; then
            echo "VPS auto-deploy is enabled for this repo."
          else
            echo "::warning::SSH_DEPLOY_ENABLED is not true — image was pushed to GHCR but the VPS was not updated."
            echo "Run backend/deploy/configure-all-repos.sh once to enable VPS auto-deploy."
          fi
